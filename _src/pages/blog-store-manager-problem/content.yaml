h1_1: The Store Manager Problem
h2_1: How This Plays Out Across Locations
h2_2: The Taste Trap
h2_3: What's the Fix for Inconsistent Audio Across Locations?
meta_1: Daniel Fox &middot; March 2026 &middot; 5 min read
btn_1: Join the Pilot
p_1: Multi-location retailers with no central audio specification end up with a different soundtrack in every store — determined by each manager's personal taste rather than the brand's customer profile. Ten locations means ten independent sonic decisions, none of them evaluated against purchase behavior, producing a brand that looks consistent visually and sounds like ten different stores.
p_2: Somewhere in your retail chain right now, a store manager is playing music they personally like. This is not a character flaw. It is a structural inevitability. You gave them a store to run, you gave them a Sonos, you gave them a login to a music service, and you gave them no specification for what the store should sound like. They filled the silence with what they know.
p_3: The problem is that the store manager's taste is not the customer's taste. It might overlap. It might not. But even when it overlaps, "music I enjoy" and "music that makes my customers spend more time and money in this environment" are different questions with different answers.
p_4: A single store with a manager who has decent taste might sound fine. The issue surfaces at scale. Ten locations means ten managers making independent sonic decisions. One store sounds like a coffee shop. Another sounds like a nightclub pre-game. A third sounds like the manager's divorce playlist. The brand, which has a style guide for fonts and a Pantone reference for every surface, has no equivalent specification for what the customer should hear.
p_5: Walk the stores on a Saturday afternoon and listen. You will hear a different brand in each one. The visual merchandising is consistent. The signage is consistent. The training is consistent. The sound environment is whatever happened to be on the manager's phone that morning.
p_6: There is a deeper issue. When the person choosing the music is also the person hearing it all day, their choices drift toward what they can tolerate for eight hours, not what the customer needs for twenty minutes. That is a reasonable human response and a terrible brand strategy. The manager's fatigue threshold is real, but it produces selections that are inoffensive rather than effective. The music becomes wallpaper. It fills the room without doing any work.
p_7: This is compounded by the fact that most people, including most store managers, do not have a framework for thinking about what music does to a room. They can tell you if they like a song. They cannot tell you whether it is producing the right arousal level for considered purchasing, or whether its production era matches the customer demographic's taste formation window, or whether the groove feel communicates the brand's relationship with time. Those are not intuitive categories. They are technical ones, and expecting an untrained person to get them right by feel is like expecting them to set the lighting rig by squinting.
p_8: The fix is to treat the sonic environment the way you treat every other element of brand execution: specify it centrally, deploy it consistently, and remove individual taste from the equation. The store manager should not be choosing the music for the same reason they should not be choosing the floor tiles. Both are brand decisions that affect the customer's experience of the space, and both should be made by someone who understands the effect they are trying to produce.
p_9: Entuned generates music to a central specification derived from the brand's customer profile. Every location gets the same sonic identity. The manager presses play. The brand sounds like itself.
