p_1: Get your store's music up and running today.
p_2: The Entuned iOS app turns your iPad into a music engine for your store. Connect to your speakers, press play, and stream music engineered for your customer's psychology.
p_3: <strong>Real-time dashboard</strong> shows you what's happening: customer dwell time, foot traffic patterns, engagement spikes, and sales correlation. See the impact as it happens.
p_4: <strong>One-tap controls:</strong> Play, pause, adjust volume, switch between profiles, or fine-tune the mood whenever you want.
p_5: Mockup for reference
p_6: Get Entuned from the Apple App Store. iOS 16+ required.
p_7: Pair with any Bluetooth or AirPlay speaker system. Works with what you already have — no special hardware needed.
p_8: Your custom-generated music starts streaming immediately. See real-time analytics on your dashboard.
p_9: See dwell time, foot traffic, engagement metrics, and sales correlation as it happens. Dashboard updates live.
p_10: Not a playlist. Original compositions engineered specifically for your Ideal Customer Profile. Infinite variety. Zero repeats.
p_11: No ASCAP. No BMI. No license negotiations. No per-stream royalties. All music is original AI generation.
p_12: Works with any Bluetooth or AirPlay speaker system. iPad, iPhone. Plug and play.
p_13: Every day we learn what's working in your store. Music generation adapts. Your soundtrack gets smarter every week.
p_14: Music streams continuously. If connection drops, pre-cached tracks keep playing until reconnection.
