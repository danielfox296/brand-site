p_4: We use Google Analytics to understand how visitors interact with our website. Google Analytics uses cookies to collect anonymous usage data. You can opt out of Google Analytics by installing the <a href="https://tools.google.com/dlpage/gaoptout" target="_blank" rel="noopener">Google Analytics Opt-out Browser Add-on</a>.
p_5: We do not sell, rent, or trade your personal information to third parties. We may share information with trusted service providers who assist us in operating our website and conducting our business, provided they agree to keep your information confidential.
p_6: We implement reasonable security measures to protect the information we collect. However, no method of transmission over the internet or electronic storage is completely secure, and we cannot guarantee absolute security.
p_7: Our website may contain links to third-party websites. We are not responsible for the privacy practices or content of those sites. We encourage you to review the privacy policies of any third-party sites you visit.
p_8: You may request access to, correction of, or deletion of your personal information at any time by contacting us. Depending on your jurisdiction, you may have additional rights under applicable data protection laws.
p_9: We may update this privacy policy from time to time. Any changes will be posted on this page with a revised "Last updated" date.
p_10: If you have questions about this privacy policy, please contact us at <a href="mailto:hello@entuned.co">hello@entuned.co</a>.
