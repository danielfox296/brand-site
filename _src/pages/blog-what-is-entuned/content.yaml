btn_1: Ask About a Pilot Program
p_1: Entuned is a retail music company. We generate original music using AI, deploy it in physical stores, and measure what happens to the store's commercial performance while it plays.
p_2: The music is not selected from a catalog. Every track is composed from scratch, built to match the psychology of the retailer's target customer. There are no licensing fees, no ASCAP or BMI obligations, and no restrictions on how the music is used. The retailer gets a continuously generated, non-repeating soundtrack that is unique to their brand and their customer.
p_3: Founded in 2025 by Daniel Fox. Headquartered in the United States. Currently in the pilot deployment phase.
p_4: A store's music stops being a background utility and starts being a measurable part of the commercial operation.
p_5: During the pilot, Entuned replaces whatever music is currently playing with a generated soundtrack built around the store's customer profile. We capture data on what's playing and correlate it against the store's own performance metrics: dwell time, transaction value, foot traffic patterns. At the end of the pilot, the retailer has data showing what the audio environment is doing to their numbers.
p_6: The music works across zones. A fitting room, a front-of-house display, and a checkout area serve different behavioral purposes. The music in each zone can reflect that, rather than forcing one playlist to serve the entire floor.
p_7: Because the music is AI-generated, it never repeats. Employees who spend eight hours a day in the store hear fresh compositions throughout every shift. Frequent customers never hear the same track twice. The musical character stays consistent (because the customer psychology hasn't changed), but the compositions themselves are always new.
p_8: The academic foundation for this work spans four decades. Milliman (1982) established that background music tempo directly controls how fast customers move through a retail space. Areni and Kim (1993) showed that music congruent with a store's positioning increases willingness to pay by 8 to 12 percent. Chebat and Michon (2003) demonstrated that ambient audio shapes quality perception independently of what a store looks like.
p_9: These findings have been replicated across product categories, geographies, and store formats. The research is not in question. What's been missing is a commercial system for acting on it. Traditional providers don't think in the terms the research uses. They think in genres and playlists. The translation from academic finding to operational deployment didn't exist until we built it.
p_10: The in-store music market has three types of providers: legacy background music companies (Mood Media, Muzak before its acquisition), streaming-based business music services (Soundtrack Your Brand, Rockbot), and satellite-delivered commercial radio (SiriusXM for Business).
p_11: All three rely on catalogs of pre-existing recordings. The music was composed for consumer listening, not for retail environments. It is organized by genre or mood and delivered as playlists.
p_12: Entuned differs in four ways. The music is generative, not curated. The targeting is psychographic, not demographic. The deployment supports multiple zones within a single store. And the platform produces measurement data that connects what's playing to what's selling.
p_13: Daniel Fox started Entuned because in-store audio is the last major environmental variable in retail that nobody is measuring. Lighting has been professionalized. Layout is data-driven. Visual merchandising has its own discipline. Scent has dedicated vendors.
p_14: Audio is still a Spotify subscription managed by whoever opens the store that morning.
p_15: The thesis is simple: advances in AI music generation make it possible to produce music to exact behavioral specifications at scale. That removes the creative bottleneck and the licensing overhead that prevented previous attempts at treating audio as a performance variable. The retailer gets music built for their customer. We get data on what works.
p_16: Entuned is running pilot deployments with select retail partners. The pilot is free. The music streams for the full duration at no cost. At the end, the retailer has their own data showing what the audio environment contributed.
p_17: If the numbers move, we talk about what comes next. If they don't, the retailer walks away having lost nothing but a background playlist they weren't measuring anyway.
p_18: <strong>Key Takeaway:</strong> Entuned replaces catalog-based playlists with original music generated from your customer's psychographic profile, then measures what that music does to your store's commercial performance.
p_19: <strong>Daniel Fox</strong> is the founder of Entuned, where he builds music systems engineered for retail customer psychology. Background in music theory, behavioral research, and data-driven product design. <a href="../about.html">More about Daniel</a>
