p_18: <strong>TL;DR:</strong> Extending dwell time doesn't just increase spending &mdash; it makes the storefront look busier, which draws more foot traffic, which makes the storefront look even busier. It's a compounding loop. But it has a ceiling&colon; too crowded repels. The ideal system reads density in real time and adjusts tempo to keep the room in the productive range.
