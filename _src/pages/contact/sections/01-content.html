
<style>
input:invalid:not(:placeholder-shown),
textarea:invalid:not(:placeholder-shown),
select:invalid:not(:placeholder-shown) {
  border-color: #e74c3c;
}

input:valid:not(:placeholder-shown),
textarea:valid:not(:placeholder-shown) {
  border-color: #27ae60;
}

.form-success {
  background: rgba(39, 174, 96, 0.1);
  border: 1px solid rgba(39, 174, 96, 0.3);
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
  display: none;
}

.form-success.visible {
  display: block;
}

.form-error {
  color: #e74c3c;
  font-size: 0.85rem;
  margin-top: 0.25rem;
  display: none;
}
</style>

  <!-- HERO -->
  <section class="hero hero-alt">
    <div class="container">
      <div class="fade-up" style="max-width: 600px;">
        <h1>{{content.h1_1}}</h1>
        <p class="subline">{{content.p_1}}</p>
      </div>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section class="section">
    <div class="container" style="max-width: 640px;">
      <form class="fade-up" action="https://formspree.io/f/xgopwepl" method="POST" id="contact-form">

        <div class="form-group">
          <label for="contact-role">I am a...</label>
          <select id="contact-role" name="role" required>
            <option value="" disabled selected>Select one</option>
            <option value="Retail Leader">Retail Leader</option>
            <option value="Investor">Investor</option>
            <option value="Technology Partner">Technology Partner</option>
            <option value="Media / Press">Media / Press</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="form-group">
            <label for="contact-first">First name</label>
            <input type="text" id="contact-first" name="first_name" required placeholder="Jane">
          </div>
          <div class="form-group">
            <label for="contact-last">Last name</label>
            <input type="text" id="contact-last" name="last_name" required placeholder="Doe">
          </div>
        </div>

        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" name="email" required placeholder="jane@company.com">
        </div>

        <div class="form-group">
          <label for="contact-company">Company <span style="opacity: 0.4; font-weight: 400;">(optional)</span></label>
          <input type="text" id="contact-company" name="company" placeholder="Acme Retail">
        </div>

        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="5" required placeholder="Tell us what you're looking for..."></textarea>
        </div>

        <!-- Honeypot -->
        <input type="text" name="_gotcha" style="display:none">

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Send Message</button>

        <div id="form-status" style="text-align: center; margin-top: 1.5rem; display: none;"></div>
      </form>

      <div class="form-success" id="form-success" style="display:none; background: rgba(39, 174, 96, 0.1); border: 1px solid rgba(39, 174, 96, 0.3); border-radius: 8px; padding: 2rem; text-align: center; margin-top: 2rem;">
        <h3 style="color: #d7af74; margin-bottom: 1rem;">{{content.h3_1}}</h3>
        <p>{{content.p_2}}</p>
      </div>
    </div>
  </section>

  <script>
  (function() {
    var form = document.getElementById('contact-form');
    var status = document.getElementById('form-status');
    if (!form) return;

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = form.querySelector('button[type="submit"]');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(function(response) {
        if (response.ok) {
          form.style.display = 'none';
          var successDiv = document.getElementById('form-success');
          if (successDiv) successDiv.style.display = 'block';
        } else {
          throw new Error('Form submission failed');
        }
      }).catch(function() {
        status.style.display = 'block';
        status.style.color = '#E24B4A';
        status.textContent = 'Something went wrong. Try emailing hello@entuned.co directly.';
        btn.textContent = 'Send Message';
        btn.disabled = false;
      });
    });
  })();
  </script>
