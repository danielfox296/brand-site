hero:
  headline: "How It Works"
  subline: "Four steps from customer psychology to measured sales lift."

step1:
  label: "Step 01"
  title: "Your customer profile drives every decision."
  text: "Not demographics. Psychology. What do they value? What aesthetic makes them feel like a space was built for them? During setup, a structured intake captures the psychographic dimensions that matter for in-store behavior. That profile becomes the blueprint for every musical decision the system makes."

step2:
  label: "Step 02"
  title: "Psychology becomes musical specification."
  text: "The customer profile maps to a precise set of compositional parameters. Tempo, mode, harmonic density, instrumentation. A proprietary translation layer converts psychological attributes into musical specifications. Every element is specified, not guessed. The difference matters. Areni and Kim (1993) and North et al. (1999) found that identity-congruent music lifts willingness to pay 8\u201312%. Incongruent music actively reduces it (Andersson et al. 2012, 601 real transactions)."

step3:
  label: "Step 03"
  title: "Original music, composed for the profile."
  text: "Every track is an original composition, generated to the specification your customer profile produced. No catalog. No licensing fees. No track repeats. And because the music is unfamiliar by design, customers stay longer. Yalch and Spangenberg (2000) found that familiar music drives shoppers out 8% faster."

step4:
  label: "Step 04"
  title: "Stream it. Measure it. Improve it."
  text: "Connect to your speakers, press play. The platform correlates what's playing against your store's performance data: dwell time, foot traffic patterns, transaction outcomes. Every store-hour produces data no competitor can buy. By week four, the system knows which musical parameters move your numbers. By week twelve, your 10th store benefits from what the first four discovered."

includes:
  eyebrow: "What Every Deployment Includes"
  headline: "Built into every pilot."

card1:
  title: "Psychographic Profiling"
  text: "A structured model of your target customer's values, aesthetics, and purchase psychology. The foundation every musical decision builds on."

card2:
  title: "Original Compositions"
  text: "Every track created fresh for your specific customer profile. Zero licensing fees. Zero catalog constraints. Infinite variety, zero repeats."

card3:
  title: "Performance Measurement"
  text: "Dwell time, transaction value, traffic patterns. All correlated against what was playing and when. Your analytics platform and your music provider finally share data."

card4:
  title: "Fleet Learning"
  text: "Every store-hour feeds the model. The relationship between specific musical variables and specific commercial outcomes gets more precise with every data point. Your 50th location benefits from what the first four discovered."

card5:
  title: "Simple Setup"
  text: "Works with any Bluetooth or AirPlay speaker system. No special hardware. Streaming starts in minutes."

pilot:
  headline: "Pilots are free."
  description: "The founding pilot program runs at no cost. At the end, you have your own data showing what the audio environment contributed to dwell time, basket size, and return visits. If the numbers move, we talk about what comes next."

pilot1:
  title: "Custom psychographic profiling."
  text: "A structured intake captures your ideal customer's values, aesthetic, and relationship with music. That profile becomes a soundtrack built specifically for them."

pilot2:
  title: "Original music, created for your store."
  text: "Every composition is built for your customer's psychology. No licensing fees. No catalog. No music that could belong to any other brand."

pilot3:
