# How It Works — editable text content
# Edit this file to change copy on the page without touching HTML.

hero:
  headline: "How It Works"
  subline: "Four steps from customer psychology to measured sales lift."

step1:
  label: "Step 01"
  title: "We profile your ideal customer."
  text: "Not demographics. Psychology. What do they value? What aesthetic makes them feel like a space was built for them? Through a detailed onboarding conversation, we build a psychographic model of your target customer. This profile becomes the blueprint for every musical decision your store makes."

step2:
  label: "Step 02"
  title: "We translate that profile into music."
  text: "Your customer profile becomes a set of precise musical specifications. Tempo, mode, harmonic density, instrumentation. Our proprietary translation layer converts psychological attributes into compositional parameters. Every element is specified, not guessed. The difference matters. Areni and Kim (1993) and North et al. (1999) found that identity-congruent music lifts willingness to pay 8-12%. Incongruent music actively reduces it (Andersson et al. 2012, 601 real transactions)."

step3:
  label: "Step 03"
  title: "We create original music for your store."
  text: "Every track is an original composition, built specifically for your customer's psychology. No catalog. No licensing fees. No track repeats. And because the music is unfamiliar by design, customers stay longer. Yalch and Spangenberg (2000) found that familiar music drives shoppers out 8% faster."

step4:
  label: "Step 04"
  title: "Stream it. Measure it. Improve it."
  text: "Connect to your speakers, press play. We correlate what's playing against your store's performance data: dwell time, foot traffic patterns, transaction outcomes. Every store-hour produces data no competitor can buy. By week four, the system knows which musical parameters move your numbers. By week twelve, your 10th store benefits from what the first four discovered."

includes:
  eyebrow: "What Every Deployment Includes"
  headline: "Built into every pilot."

card1:
  title: "Psychographic Profiling"
  text: "A detailed model of your target customer's values, aesthetics, and purchase psychology. This is the foundation every musical decision builds on."

card2:
  title: "Original Compositions"
  text: "Every track created fresh for your specific customer profile. Zero licensing fees. Zero catalog constraints. Infinite variety, zero repeats."

card3:
  title: "Performance Measurement"
  text: "Dwell time, transaction value, traffic patterns. All correlated against what was playing and when. Your analytics platform and your music provider finally share data."

card4:
  title: "Fleet Learning"
  text: "Every store-hour feeds the model. The relationship between specific musical variables and specific commercial outcomes gets more precise with every data point. Your 50th location benefits from what the first four discovered."

card5:
  title: "Simple Setup"
  text: "Works with any Bluetooth or AirPlay speaker system. No special hardware. Streaming starts in minutes."

pilot:
