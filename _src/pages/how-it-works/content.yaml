# How It Works — editable text content
# Edit this file to change copy on the page without touching HTML.

hero:
  headline: "How It Works"
  subline: "From your customer's psychology to your store's soundtrack."

step1:
  label: "Step 01"
  title: "We profile your ideal customer."
  text: "Not demographics. Psychology. What do they value? What's their aesthetic? What makes them feel like a space was built for them? Through a detailed onboarding conversation, we build a psychographic model of your target customer. This becomes the foundation of your store's soundtrack."

step2:
  label: "Step 02"
  title: "We translate that profile into music."
  text: "Your customer profile becomes a set of precise musical specifications. Our proprietary translation layer converts psychological attributes into the parameters that determine what the music sounds like. Every element of the composition is specified, not guessed."

step3:
  label: "Step 03"
  title: "AI generates original music for your store."
  text: "Every track is an original composition, generated specifically for your customer's psychology. No catalog. No licensing fees. No track repeats. The music is as unique as your customer, and it evolves as we learn what works in your space."

step4:
  label: "Step 04"
  title: "Stream it. Measure it."
  text: "Connect to your speakers, press play. The app streams your soundtrack continuously. We correlate what's playing against your store's performance data: dwell time, foot traffic patterns, and transaction outcomes. You see what's working. The music gets smarter over time."

includes:
