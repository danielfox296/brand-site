p_6: The Problem
p_7: Chains pay $15–$50/mo for generic streaming. Music is chosen by intuition, not data.
p_8: No visibility into whether music helps or hurts sales.
p_9: The real cost isn't the streaming bill — it's the revenue lost every day to music that doesn't speak to the customer in front of it.
