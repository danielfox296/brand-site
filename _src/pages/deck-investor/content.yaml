p_42: Business Model
p_43: Free to pilot partners. Entuned replaces existing streaming spend at zero cost. The value exchange: we get access to behavioral data. The retailer gets optimized music and a measurement layer they've never had.
p_44: $300–500 per store per month. Replaces $15–50 streaming at a premium — but the product isn't music, it's a measurable performance channel. At $100K monthly store revenue, even a 1% lift is $1,000/month. We capture 30–50% of the value we create.
p_45: Base SaaS plus a performance bonus above a proven lift threshold. Uncapped upside for both parties. The more stores in the network, the smarter Miles gets, the higher the lift, the more we earn.
p_46: Downstream revenue: data licensing · generative model API · brand insights product
