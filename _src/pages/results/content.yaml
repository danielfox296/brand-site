p_1: Specific findings from peer-reviewed studies. Real store data coming soon.
p_2: Forty years of controlled experiments in real retail environments. These are not projections. They are published findings with named researchers, sample sizes, and effect magnitudes. We built our system to act on them.
p_3: "Milliman (1982) found slow tempo increased dwell time 38% in grocery. But here's the nuance most vendors miss: Knoferle et al. (2011) showed that tempo alone doesn't move sales. Slow tempo in a minor mode produced a sales lift. Slow tempo in a major mode did not. Most retail music providers have the thermostat. They don't have the engine."
p_4: "Areni and Kim (1993) found classical music in a wine store lifted average transaction value from $6.93 to $12.31. North et al. (1999) found French music tripled French wine sales. The mechanism is identity congruence: when the music matches the customer's self-image, willingness to pay rises 8-12%."
p_5: "Yalch and Spangenberg (2000) tested familiar vs. unfamiliar music in a department store. Shoppers exposed to familiar music left 8% sooner. They reported enjoying it more, but they left faster. AI-created music is unfamiliar by definition. That's not a limitation. It's the point."
p_6: "Gueguen and Jacob (2013) played romantic music in a flower shop and measured a 28.6% increase in customer spending. Andersson et al. (2012) ran 601 real transactions and found the inverse: incongruent music actively reduced willingness to pay. Getting it wrong costs you money."
p_7: We're running pilots with premium retailers across fashion, home goods, and specialty retail. Results from our first cohort will be published here in <strong style="color: #d7af74;">Q3 2026</strong>.
p_8: Real store data. Real metrics. Every case study will show before/after performance, methodology, and the specific psychographic positioning that drove results.
p_9: Pilot participants get priority pricing and co-marketing opportunities. Your results could be featured here alongside the science that backs them.
p_10: Milliman (1982)
p_11: "Slow tempo music increased grocery store dwell time by 38% and daily gross receipts by 32%. But tempo alone doesn't predict sales. Knoferle et al. (2011) showed the lift requires slow tempo in a minor mode. Major mode eliminates the effect."
p_12: Smith & Curnow (1966)
p_13: "One of the earliest controlled studies of music volume in retail. Loud music reduced shopping time without increasing sales. The finding holds: volume is a blunt instrument."
p_14: Areni & Kim (1993)
p_15: "Classical music in a wine cellar nearly doubled average transaction value, from $6.93 to $12.31. Customers selected more expensive bottles, not more bottles. The music changed perceived value, not purchase intent."
p_16: North et al. (1999)
p_17: "French music tripled French wine sales over a two-week period. German music had the same effect on German wine. Customers denied being influenced. The congruence effect operates below conscious awareness."
p_18: Chebat & Michon (2003)
p_19: "Tested the mediating role of affect in how music influences perceived product quality. Found that music shapes the emotional state of shoppers, which in turn shifts how they evaluate what they're looking at. The audio environment changes what the product feels like it's worth."
