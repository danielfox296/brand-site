h2_6: Is Retail Audio Worth the Investment?
p_1: Your VP of Store Experience wants to change the music. They've been reading about psychographic targeting, or somebody pitched them a demo, or they walked into a competitor's store and noticed something they couldn't quite name but knew mattered. They're asking for budget.
p_2: And you're looking at a line item that didn't exist before, wondering what the return looks like.
p_3: That's a reasonable question. It's also the right one, because the answer is surprisingly clean once you lay out the variables.
p_4: Retail audio affects four measurable things. Not feelings. Not vibes. Numbers that show up in your existing reporting.
p_5: <strong>Dwell time.</strong> How long a customer stays in the store. This is the most sensitive variable and the easiest to measure. Slower tempo music (60 to 80 BPM) matched to the customer's psychology extends average visit duration. The research consistently shows increases in the range of 15 to 25 percent. A customer who stays twelve minutes instead of ten is a customer who touches more product, asks more questions, and makes it further through the purchase decision.
p_6: <strong>Basket size.</strong> Dwell time and basket size are correlated, and the correlation is well-documented enough that most retail analytics teams already track them together. A customer who lingers in a section doesn't just look at one more thing. They reconsider what they came in for. They add. The incremental spend tends to follow the dwell time increase proportionally.
p_7: <strong>Willingness to pay.</strong> This is the number most CFOs haven't seen. When music matches a customer's identity and values, their perception of the products changes. <a href="https://scholar.google.com/scholar?q=areni+kim+1993+wine+store+music" target="_blank" rel="noopener">Areni and Kim</a> published the foundational study in 1993. <a href="https://scholar.google.com/scholar?q=north+hargreaves+mcKendrick+1999+wine+music" target="_blank" rel="noopener">North, Hargreaves, and McKendrick</a> replicated it in 1999. The finding: <span class="highlight">customers in an environment with identity-congruent music pay 8 to 12 percent more for the same product</span>. Not because the price changed. Because their perception of what the product was worth changed.
p_8: <strong>Return visits.</strong> Harder to isolate, but the mechanism is straightforward. A store that feels like it was designed for a specific person makes that person want to come back. The audio environment is part of that signal. When it's right, the store earns a kind of loyalty that has nothing to do with a rewards program.
p_9: Take your numbers. Not aspirational numbers. Actual trailing-twelve-month numbers from your P&amp;L and your store analytics.
p_10: Say you run 10 locations. Average transaction value is $250. Each store sees 2,000 transactions per month. That's $5 million in monthly revenue across the portfolio.
p_11: <span class="highlight">A 5 percent increase in willingness to pay on the same traffic, same conversion rate, same product mix: $250,000 per month. Three million a year.</span> And 5 percent is the conservative end of what the research supports.
p_12: Now look at what the audio environment costs. Generic licensing from a catalog provider runs $15 to $50 per location per month. They charge that for music that could belong to any retailer in your category. During the Entuned founding pilot, the cost is zero.
p_13: <span class="highlight">Even a conservative 1 percent lift on that baseline is $50,000 per month across the portfolio.</span> Against a free pilot, that's infinite ROI.
p_14: Most capital allocation decisions in retail don't produce those ratios. Visual merchandising, lighting retrofits, new POS hardware, loyalty program software. Each of them justified, each of them useful. None of them are free to test.
p_15: The reason your company hasn't spent real money on audio strategy is that until recently, there was nothing to buy that warranted serious investment.
p_16: Mood Media and Soundtrack Your Brand are the incumbents. They charge for access to a catalog of licensed music. The music is organized by mood or genre. Someone on the retail team picks a playlist, and that playlist plays until someone remembers to change it.
p_17: This model has two problems. The first is that it doesn't solve the actual problem. A playlist organized by mood is not a playlist organized by your customer's psychology. "Upbeat" is not a customer profile. "Indie rock" is not a psychographic strategy. The catalog model treats audio as atmosphere. The research treats it as a behavioral variable.
p_18: The second problem is licensing cost at scale. Music licensing fees are per-location, and they come with the full apparatus of ASCAP, BMI, and SESAC compliance. For a 50-location chain, the licensing cost alone can run $50,000 to $200,000 per year before you account for the curation service. You pay that, and what you get is music that could belong to any retailer in your category.
p_19: Entuned generates original music. Every track is created specifically for a retailer's customer profile. No licensing fees. No per-stream costs. No PRO compliance. The retailer owns the music. This changes the cost structure entirely, and it changes the ceiling on what the audio environment can do.
p_20: If you're the financial decision-maker being asked to approve this spend, the reasonable move is to test it before committing.
p_21: That's what the founding pilot is for. A controlled pilot with matched treatment and control locations, running long enough to produce clean data.
p_22: At the end, you have actual data. Your data, from your stores, with your customers. Dwell time comparison. Transaction value comparison. Traffic patterns. Whatever you already measure, measured against a single variable change.
p_23: The pilot costs nothing. The music streams for free for the full duration. If the numbers don't move, you walk away. If they do, you have the cleanest ROI case you've ever presented to your board, because you're not projecting from somebody else's study. You're reporting from your own stores.
p_24: For the finance team that needs to model this properly, here's what the numbers look like in a standard investment analysis.
p_25: During the founding pilot, there is no cost. Zero. Entuned replaces your existing streaming spend and runs for the full pilot duration at no charge.
p_26: The return model is straightforward. If the pilot shows a 3 percent lift in average transaction value, calculate the incremental revenue per location per month and multiply across the portfolio. Post-pilot terms are discussed only after you've seen the data.
p_27: At 3 percent lift on $250 average transaction value with 2,000 monthly transactions per location, a single location generates <span class="highlight">$15,000 in incremental monthly revenue</span>. During the pilot, that's pure upside at zero cost.
p_28: At 5 percent, it's $25,000 per location.
p_29: At 8 percent, it's $40,000.
p_30: These are not projections from a pitch deck. They're arithmetic applied to research that's been replicated for thirty years. The pilot is the mechanism for confirming which number is yours.
p_31: Most CFOs who push back on a new line item for audio aren't really asking whether the math works. They're asking whether this is real or whether someone on the retail team got excited about a vendor demo and is now trying to justify an expense that will produce no measurable return.
p_32: That's a fair concern. The answer is in the data. Run the pilot. Measure it the same way you measure every other store-level initiative. If the lift is there, the investment case writes itself. If it isn't, you've lost nothing but background music you were going to play anyway.
p_33: The stores that have done this aren't guessing anymore. They stopped treating audio as a utility bill and started treating it as a revenue variable. The difference between those two categories is the difference between a $50/month Spotify subscription and a quarter million dollars in annual incremental revenue.
p_34: <span class="highlight">Your existing music isn't free. It's just bad ROI that nobody's measured.</span>
