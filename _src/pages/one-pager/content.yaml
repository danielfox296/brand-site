# one-pager — editable text content

h1_1: The Data-Driven DJ for Retail
p_1: Entuned deploys original soundtracks in retail stores and uses existing behavioral analytics to build the first dataset mapping musical composition parameters to verified commercial outcomes. The pilot is free. The data is the product — and nobody else has it.
p_2: Every retail chain plays music. Not one of them knows if it's working — because the dataset to prove it commercially has never been built. The academic literature shows music drives dwell time, willingness to pay, and ticket size. The commercial proof doesn't exist yet. We're building it.
p_3: Two things converged in 2024: AI music generation hit production quality (parametric composition, no licensing costs, no catalog constraints), and retail analytics platforms opened store-level behavioral data via API. The sensor layer already exists in thousands of stores. What didn't exist was a system that could act on it through a behavioral intervention and measure the result.
p_4: 3–5 pilot partners. Treatment and control store pairs generating proprietary data across 12 months. At the end: statistically significant proof that specific musical variables cause measurable lift — or we know the thesis doesn't hold. Either outcome is worth the raise.
p_5: Dozens of musical parameters × real retail environments × time = a dataset that has never existed. The more stores we run, the smarter the system gets. The smarter it gets, the more defensible we become. No competitor can replicate years of cross-retail musical data without years of access to real stores.
p_6: Free pilots in Year 1. Post-proof SaaS at $300–500/store/month in Year 2 — replacing $15–50 streaming at a premium, but the product is a measurable performance channel, not music. We capture 30–50% of the value we create. Performance pricing tier available above proven lift threshold.
p_7: Daniel Fox — pro jazz musician, music theoretician, two-time founder (Skreenced, Deep Avatar). Provisional patent on the psychographic-to-musicological translation engine. Currently studying retail operations hands-on.
p_8: $1.9B global commercial music market. $760M retail segment (NA + Europe). Initial wedge: lifestyle retail brands with 5+ locations and existing analytics infrastructure.
