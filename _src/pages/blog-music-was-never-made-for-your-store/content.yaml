p_14: The mismatch in retail music has always been obvious once you see it. Every other serious use of music involves intention. The church thinks carefully about what the congregation should experience. The concert tour is engineered down to the set list. Film composers spend months matching music to emotional arcs that last two hours.
p_15: Retail gets a playlist.
p_16: That ends when someone decides to treat the music in their store the way every other serious context treats music: as a tool with a specific job to do.
