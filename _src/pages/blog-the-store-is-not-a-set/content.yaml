h1_1: The Store Is Not a Set
h2_1: What Miles Davis Knew About Rooms
h2_2: Why the Alternative Is Hard to Picture
h2_3: The Read and the Response
meta_1: Daniel Fox &middot; April 2026 &middot; 5 min read
btn_1: Ask About a Pilot Program
p_1: The language around retail experience design tends to borrow from theater. Stage. Set. Cast. Audience. Pine and Gilmore formalized it in 1998 with <em>The Experience Economy</em>, and the metaphor stuck because it was useful. Stores got better at storytelling. Visual merchandising became a discipline. Customers walked into something intentional.
p_2: A stage is designed once, for a general audience, and runs the same way each night. The customer is assumed, not encountered.
p_3: There's a different thing a retail environment could be.
p_4: Think about what Miles Davis and his musicians were doing in the years before <em>Kind of Blue</em>. Collectively they had logged thousands of hours on stages, in clubs, in rooms of every size and mood. That experience adds up to something: an ability to read what a room is doing, who is in it, what it wants. When Davis gave his musicians a modal framework instead of a fixed score, he was creating conditions for exactly that. His musicians weren't executing a chart. They were playing the room, through everything they'd accumulated over years of paying attention.
p_5: Jane Jacobs did something similar with city streets. Planners treated them as throughput problems. Jacobs looked at the same streets and saw something alive, where density, mixed use, and foot traffic at odd hours were what made neighborhoods safe and functional. Planners kept trying to remove exactly that.
p_6: Retail is currently somewhere in the middle. The designed experience has gotten sophisticated. But most of what goes into a store, including the music, is fixed before customers arrive and stays that way regardless of who shows up or when. Retailers dress the stage. The performance runs.
p_7: There's a reason the alternative is hard to picture, and it's worth naming. We don't have a ready frame for stepping into something that's playing us. Some immersive museum installations get close, where the environment responds to your presence and shifts as you move. But those are rare and purpose-built. Most people haven't spent time inside something adjusting to them in real time. People need a minute to land there. That's fine.
p_8: Here's what the mechanism looks like. <a href="https://retailnext.net/" target="_blank" rel="noopener">RetailNext's</a> sensor suite tracks foot traffic, dwell time, and movement patterns across the sales floor in real time. That data feeds into <a href="../blog/what-is-entuned.html">Entuned</a>, which uses it to specify and generate music keyed to what's happening in specific zones at that moment, adjusting continuously as the room changes. The compositions are generated for what's happening now.
p_9: <span class="highlight">The RetailNext sensors are the read. Entuned is the response. The store is the instrument.</span>
p_10: Miles's musicians read a room through decades of accumulated performance experience. They sensed what was happening, adjusted, played. Entuned does that at the speed and consistency retail requires. The musicians don't tour with you. The sensor suite does.
p_11: The retail experience has gotten very good at being a stage. Entuned is interested in what happens when it becomes an instrument instead.
