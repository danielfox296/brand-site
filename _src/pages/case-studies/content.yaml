h2_1: How We Measure
h2_2: Be a Case Study
btn_1: Start a Pilot
p_1: Rigorous measurement from controlled retail deployments.
p_2: Every Entuned pilot runs a test-vs-control design. Matched store pairs, or before-and-after for single locations, over 12 weeks with weekly analytics. We track dwell time, average transaction value, items per transaction, foot traffic, and return visits. The retailer sees every data point we see.
p_3: "Each published case study will include the retail vertical, deployment parameters, measurement methodology, and observed outcomes. No vanity metrics. No cherry-picked timeframes. Just clean comparisons from controlled environments."
p_4: Pilots are currently running across apparel, wine, and hospitality retail. Results are accumulating weekly. The first studies will publish here as soon as the data clears our reporting threshold.
p_5: We are looking for retail operators who want to know exactly what their in-store audio does to customer behavior. Pilot participants get full measurement at zero cost and co-publishing rights on the results.
