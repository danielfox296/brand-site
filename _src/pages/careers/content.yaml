p_1: Build the measurement layer for retail audio.
p_2: Entuned is early-stage and not currently hiring. When we do, the roles will sit at the intersection of music psychology, data science, retail operations, and generative audio technology.
p_3: If that intersection describes your background and you want to be considered when roles open, reach out. We keep a short list of people we want to talk to when the time comes.
