btn_1: See the Numbers for Your Stores
p_1: "Your stores play music every hour they are open. Ask your current provider one question: what did the music contribute to revenue this quarter? If they cannot answer, you are paying for an uncontrolled variable."
p_2: "A concrete example: 10 retail locations, $250 average transaction, 2,000 transactions per month per store. That is $5M in monthly revenue. Areni & Kim (1993) and North et al. (1999) found 8-12% willingness-to-pay lift from congruent music. Even at 3%, a single location adds $15,000/month. At 8%, it is $40,000. Meanwhile, Andersson et al. (2012) measured 601 real transactions and found that incongruent music actively reduced willingness to pay. Your current audio probably is not neutral. It is probably costing you revenue."
p_3: "<strong>Assumptions:</strong> 10 locations, $250 avg transaction, 2,000 transactions/month/location. Lift figures drawn from peer-reviewed research. Actual attribution depends on your measurement methodology and baseline controls. Pilot participation is free."
p_4: "Mood Media and similar providers charge $50,000-$200,000/year for a 50-location chain. Long-term contracts, termination penalties, no measurement, no targeting beyond genre. Entuned builds original music for your specific customer profile and measures the result. Can your current provider tell you what the music contributed this quarter? That question alone probably eliminates them."
p_5: "The founding pilot starts with 2 locations. For enterprise validation at scale, the ideal structure is 40 active stores against 40 control stores. Same product mix, same promotional calendar, same time window. You measure it with your existing POS and analytics infrastructure."
p_6: If the numbers do not move, you walk away with the data. Zero financial risk. Zero contractual obligation.
p_7: "We will walk through the ROI arithmetic for your specific store portfolio, transaction volume, and average ticket. No decks. Just numbers."
