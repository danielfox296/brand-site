<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  {{meta_description}}

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SGMVDBYXFG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SGMVDBYXFG');
  </script>

  <link rel="stylesheet" href="{{css_path}}styles.css">
  {{page_style}}
</head>
<body>
  {{header}}

  {{content}}

  {{footer}}

  <script>
    // Navigation active state
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      if (link.href === window.location.href) {
        link.classList.add('active');
      }
    });

    // Intersection Observer for fade-up animations
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    document.querySelectorAll('.fade-up, .fade-in').forEach(el => {
      observer.observe(el);
    });

    // Mobile menu toggle
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    const navLinksEl = document.querySelector('.nav-links');
    if (menuToggle && navLinksEl) {
      menuToggle.addEventListener('click', () => {
        navLinksEl.classList.toggle('mobile-open');
        menuToggle.textContent = navLinksEl.classList.contains('mobile-open') ? '✕' : '☰';
      });
    }

    // Accordion toggle
    document.querySelectorAll('.accordion-trigger').forEach(trigger => {
      trigger.addEventListener('click', () => {
        const accordion = trigger.parentElement;
        const isOpen = accordion.getAttribute('data-open') === 'true';
        accordion.setAttribute('data-open', isOpen ? 'false' : 'true');
        trigger.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });
    });

    // Audio player
    (function() {
      let currentAudio = null;
      let currentTrack = null;
      document.querySelectorAll('.audio-track').forEach(track => {
        const btn = track.querySelector('.audio-play-btn');
        const bar = track.querySelector('.audio-progress-bar');
        const time = track.querySelector('.audio-time');
        if (!btn) return;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (currentAudio && currentTrack === track) {
            if (currentAudio.paused) { currentAudio.play(); btn.innerHTML = '&#9646;&#9646;'; track.classList.add('playing'); }
            else { currentAudio.pause(); btn.innerHTML = '&#9654;'; track.classList.remove('playing'); }
            return;
          }
          if (currentAudio) { currentAudio.pause(); currentTrack.querySelector('.audio-play-btn').innerHTML = '&#9654;'; currentTrack.classList.remove('playing'); currentTrack.querySelector('.audio-progress-bar').style.width = '0%'; }
          currentAudio = new Audio(track.dataset.src);
          currentTrack = track;
          currentAudio.play();
          btn.innerHTML = '&#9646;&#9646;';
          track.classList.add('playing');
          currentAudio.addEventListener('timeupdate', () => {
            if (!currentAudio.duration) return;
            const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
            bar.style.width = pct + '%';
            const m = Math.floor(currentAudio.currentTime / 60);
            const s = Math.floor(currentAudio.currentTime % 60);
            time.textContent = m + ':' + (s < 10 ? '0' : '') + s;
          });
          currentAudio.addEventListener('ended', () => { btn.innerHTML = '&#9654;'; track.classList.remove('playing'); bar.style.width = '0%'; time.textContent = '0:00'; currentAudio = null; currentTrack = null; });
        });
      });
    })();
  </script>
</body>
</html>
