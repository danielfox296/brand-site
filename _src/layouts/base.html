<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="{{css_path}}img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{css_path}}img/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="{{css_path}}img/favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{css_path}}img/apple-touch-icon.png">
  <link rel="manifest" href="{{css_path}}site.webmanifest">
  <link rel="canonical" href="{{canonical_url}}">
  <meta name="robots" content="{{robots}}">
  <title>{{title}}</title>
  {{meta_description}}

  <!-- Open Graph -->
  {{og_tags}}

  <!-- Twitter Card -->
  {{twitter_tags}}

  <!-- Structured Data -->
  {{schema_json}}

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SGMVDBYXFG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SGMVDBYXFG');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{css_path}}styles.css">
  {{page_style}}
</head>
<body>
  {{header}}

  <main>
  {{content}}
  </main>

  {{footer}}

  <script>
    // Navigation active state
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      if (link.href === window.location.href) {
        link.classList.add('active');
      }
    });

    // Intersection Observer for fade-up animations
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    document.querySelectorAll('.fade-up, .fade-in').forEach(el => {
      observer.observe(el);
    });

    // Mobile menu toggle
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    const navLinksEl = document.querySelector('.nav-links');
    if (menuToggle && navLinksEl) {
      menuToggle.addEventListener('click', () => {
        navLinksEl.classList.toggle('mobile-open');
        menuToggle.textContent = navLinksEl.classList.contains('mobile-open') ? '✕' : '☰';
      });
    }

    // Nav dropdown toggle (mobile)
    document.querySelectorAll('.nav-dropdown-trigger').forEach(trigger => {
      trigger.addEventListener('click', (e) => {
        e.preventDefault();
        const dropdown = trigger.closest('.nav-dropdown');
        dropdown.classList.toggle('open');
      });
    });

    // Accordion toggle
    document.querySelectorAll('.accordion-trigger').forEach(trigger => {
      trigger.addEventListener('click', () => {
        const accordion = trigger.parentElement;
        const isOpen = accordion.getAttribute('data-open') === 'true';
        accordion.setAttribute('data-open', isOpen ? 'false' : 'true');
        trigger.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });
    });

  </script>
</body>
</html>
